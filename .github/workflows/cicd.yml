name: cicd

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/cicd.yml'
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'docker-entrypoint-node.sh'
      - 'package.json'
      - 'package-lock.json'
      - 'server.js'
      - 'src/**'
      - 'drizzle/**'
      - 'drizzle-pg/**'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]

    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up QEMU
        if: matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: ghcr.io/ivanjx/dockhand:${{ github.ref_name }}${{ matrix.platform == 'linux/arm64' && '-arm64' || '' }}
          cache-from: type=gha,scope=dockhand-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=dockhand-${{ matrix.platform }}
